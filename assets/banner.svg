<svg width="900" height="260" viewBox="0 0 900 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="card">
      <rect width="900" height="260" rx="22"/>
    </clipPath>
    <radialGradient id="blobA" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2AA0E6" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#2AA0E6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobB" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B7CF6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#8B7CF6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="underline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2AA0E6"/>
      <stop offset="100%" stop-color="#8B7CF6"/>
    </linearGradient>
    <filter id="soften" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
  </defs>

  <g clip-path="url(#card)">
    <!-- deep ink background -->
    <rect width="900" height="260" fill="#0E1524"/>

    <!-- soft aurora blobs, drifting slowly -->
    <circle cx="180" cy="60" r="190" fill="url(#blobA)" filter="url(#soften)">
      <animate attributeName="cx" values="180;260;180" dur="11s" repeatCount="indefinite"/>
    </circle>
    <circle cx="740" cy="210" r="210" fill="url(#blobB)" filter="url(#soften)">
      <animate attributeName="cx" values="740;660;740" dur="13s" repeatCount="indefinite"/>
    </circle>

    <!-- a wisp of fog drifting across the bottom -->
    <ellipse cx="450" cy="265" rx="420" ry="55" fill="#FFFFFF" opacity="0.06" filter="url(#soften)">
      <animate attributeName="cx" values="380;520;380" dur="16s" repeatCount="indefinite"/>
    </ellipse>

    <!-- twinkling sparkles -->
    <g fill="#BFE3FF">
      <path d="M96 178 C97.5 172 99 170.5 105 169 C99 167.5 97.5 166 96 160 C94.5 166 93 167.5 87 169 C93 170.5 94.5 172 96 178 Z">
        <animate attributeName="opacity" values="0;1;0" dur="3.2s" repeatCount="indefinite"/>
      </path>
      <path d="M792 84 C793.8 76.8 795.6 75 802.8 73.2 C795.6 71.4 793.8 69.6 792 62.4 C790.2 69.6 788.4 71.4 781.2 73.2 C788.4 75 790.2 76.8 792 84 Z">
        <animate attributeName="opacity" values="0;1;0" dur="4.1s" begin="1.1s" repeatCount="indefinite"/>
      </path>
      <path d="M700 190 C701.2 185.2 702.4 184 707.2 182.8 C702.4 181.6 701.2 180.4 700 175.6 C698.8 180.4 697.6 181.6 692.8 182.8 C697.6 184 698.8 185.2 700 190 Z">
        <animate attributeName="opacity" values="0;0.9;0" dur="2.7s" begin="0.6s" repeatCount="indefinite"/>
      </path>
      <path d="M150 84 C151.2 79.2 152.4 78 157.2 76.8 C152.4 75.6 151.2 74.4 150 69.6 C148.8 74.4 147.6 75.6 142.8 76.8 C147.6 78 148.8 79.2 150 84 Z">
        <animate attributeName="opacity" values="0;0.8;0" dur="3.7s" begin="2s" repeatCount="indefinite"/>
      </path>
    </g>

    <!-- name + role -->
    <text x="450" y="122" text-anchor="middle" fill="#F4F7FB"
          font-family="'SF Pro Display','Segoe UI','Helvetica Neue',system-ui,sans-serif"
          font-size="54" font-weight="700" letter-spacing="0.5">Diana Kao</text>
    <text x="450" y="162" text-anchor="middle" fill="#9FB3C8"
          font-family="'SF Pro Display','Segoe UI','Helvetica Neue',system-ui,sans-serif"
          font-size="15" font-weight="500" letter-spacing="7">UX DESIGNER</text>
    <rect x="410" y="182" width="80" height="3" rx="1.5" fill="url(#underline)"/>
    <text x="450" y="214" text-anchor="middle" fill="#7C8FA5"
          font-family="'SF Pro Display','Segoe UI','Helvetica Neue',system-ui,sans-serif"
          font-size="14" font-weight="400" letter-spacing="0.3">clean · modern · fun · human</text>
  </g>
</svg>
